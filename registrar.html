<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Persona</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h4>Registrar Persona</h4>

<div class="card mt-3">
<div class="card-body">

<div class="mb-3">
<label>DNI</label>
<input type="text" id="dniPersona" class="form-control">
</div>

<div class="mb-3">
<label>Nombre</label>
<input type="text" id="nombrePersona" class="form-control">
</div>

<div class="mb-3">
<label>Apellido</label>
<input type="text" id="apellidoPersona" class="form-control">
</div>

<div class="mb-3">
<label>Cargo</label>
<input type="text" id="cargoPersona" class="form-control">
</div>

<button class="btn btn-primary" onclick="registrarPersona()">
Guardar Persona
</button>

<button class="btn btn-success" onclick="listarPersonas()">
Listar Personas
</button>
<hr>

<h5>Asistencias Registradas</h5>

<div id="listaAsistencias"></div>

</div>
</div>

<hr>

<h4>Personas Registradas</h4>

<div id="listaPersonas"></div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
