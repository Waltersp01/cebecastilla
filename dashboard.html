<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Administrador</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow">
    <div class="card-header bg-dark text-white d-flex justify-content-between">
      <h4 class="mb-0">Panel Administrador</h4>
      <button class="btn btn-danger btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
    <div class="card-body">

      <!-- Filtros -->
      <div class="row mb-3">
        <div class="col-md-4">
          <label>Filtrar por fecha</label>
          <input type="date" id="fechaFiltro" class="form-control">
        </div>
        <div class="col-md-8 d-flex align-items-end gap-2">
          <button class="btn btn-primary" onclick="listarAsistencias()">Ver Todas</button>
          <button class="btn btn-success" onclick="mostrarAsistenciasHoy()">Asistencias de Hoy</button>
          <button class="btn btn-warning" onclick="filtrarAsistencias()">Filtrar</button>
          <a href="registrar.html" class="btn btn-warning">Gestion Personal</a>
        </div>
      </div>

      <hr>

      <h5>Asistencias Registradas</h5>
      <div id="listaAsistencias"></div>

    </div>
  </div>
</div>

<!-- Modal Editar Hora -->
<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar Hora de Entrada/Salida</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="editId">

        <label>Hora Entrada</label>
        <input type="text" id="nuevaHoraEntrada" class="form-control mb-3" placeholder="10:16:41 p. m.">

        <label>Hora Salida</label>
        <input type="text" id="nuevaHoraSalida" class="form-control" placeholder="05:30:12 p. m.">
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-success" onclick="guardarHoras()">Guardar</button>
      </div>

    </div>
  </div>
</div>

<!-- Scripts necesarios -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
