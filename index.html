<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Asistencia</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h4 class="mb-0">Control de Asistencia</h4>
</div>

<div class="card-body">

<div class="mb-3">
<label>DNI</label>
<input type="text" id="dni" class="form-control" placeholder="Ingrese DNI">

</div>

<div class="mb-3">

<button class="btn btn-primary" onclick="buscarPersona()">
Buscar Persona
</button>



</div>

<hr>

<h5>Datos de la persona</h5>

<div id="datos" class="alert alert-info">
Aquí aparecerán los datos
</div>

</div>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
